name: 构建 Blog RAG API

on:
  push:
    branches:
      - master
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'Dockerfile'
      - '.github/workflows/build.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'Dockerfile'
      - '.github/workflows/build.yml'
  workflow_dispatch:

concurrency:
  group: blog-rag-api-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on:
      - self-hosted
      - blog-rag-api
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    steps:
      - name: 检出代码
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s dotglob nullglob
          for item in * .*; do
            case "$item" in
              .|..|.runner-cache)
                continue
                ;;
            esac
            rm -rf "$item"
          done
          curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -o source.tar.gz \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/tarball/${GITHUB_SHA}"
          tar -xzf source.tar.gz --strip-components=1
          rm source.tar.gz

      - name: 检查依赖缓存
        id: deps
        run: |
          set -euo pipefail
          mkdir -p .runner-cache/m2
          sha256sum pom.xml | awk '{print $1}' > .runner-cache/deps.sha.current

          if [ -d .runner-cache/m2 ] && [ -f .runner-cache/deps.sha ] && cmp -s .runner-cache/deps.sha.current .runner-cache/deps.sha; then
            echo "refresh=false" >> "$GITHUB_OUTPUT"
            echo "pom.xml 未变化，使用缓存的 Maven 依赖"
          else
            echo "refresh=true" >> "$GITHUB_OUTPUT"
            echo "pom.xml 已变化或缓存缺失，刷新 Maven 依赖"
          fi

      - name: 构建
        run: |
          if [ "${{ steps.deps.outputs.refresh }}" = "true" ]; then
            mvn -B -Dmaven.repo.local="$PWD/.runner-cache/m2" test package
            cp .runner-cache/deps.sha.current .runner-cache/deps.sha
          else
            mvn -B -o -Dmaven.repo.local="$PWD/.runner-cache/m2" test package
          fi
